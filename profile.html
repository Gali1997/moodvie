<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodvie · Your Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --cream:  #f1e3bf;
      --gold:   #d4a84a;
      --amber:  #b4761e;
      --crimson:#7a1818;
      --ink:    #1a0f08;
      --deep:   #050302;
      --muted:  rgba(241,227,191,0.5);
      --border: rgba(201,168,76,0.12);
      --serif:  'Playfair Display', Georgia, serif;
      --sans:   'Inter', sans-serif;
    }
    html, body {
      background:#000; color:var(--cream);
      font-family:var(--sans); overflow-x:hidden;
      cursor:none; user-select:none; -webkit-user-select:none;
    }

    /* ─── Cursor ─── */
    .cursor {
      position:fixed; top:0; left:0; width:34px; height:34px;
      border:1px solid rgba(241,227,191,0.45); border-radius:50%;
      pointer-events:none; z-index:9999; transform:translate(-50%,-50%);
      mix-blend-mode:difference; transition:width .35s, height .35s;
    }
    .cursor-dot {
      position:fixed; top:0; left:0; width:4px; height:4px;
      background:var(--cream); border-radius:50%;
      pointer-events:none; z-index:10000; transform:translate(-50%,-50%);
    }
    .grain {
      position:fixed; inset:0; z-index:9998; pointer-events:none; opacity:0.035;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    @media (hover:none), (pointer:coarse) {
      html, body { cursor:auto; }
      .cursor, .cursor-dot { display:none !important; }
      a, button { cursor:auto; }
    }

    /* ─── Nav ─── */
    .nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:1.8rem 3rem;
      background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }
    .nav-brand {
      font-family:var(--serif); font-size:1.15rem; font-weight:700;
      letter-spacing:0.12em; color:var(--cream); text-decoration:none;
    }
    .nav-links { display:flex; gap:2rem; }
    .nav-link {
      font-family:var(--sans); font-size:0.55rem; font-weight:400;
      letter-spacing:0.35em; text-transform:uppercase; text-decoration:none;
      color:rgba(241,227,191,0.6); position:relative; cursor:none;
    }
    .nav-link::after {
      content:''; position:absolute; bottom:-4px; left:0; right:0;
      height:1px; background:var(--gold); transform:scaleX(0);
      transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    .nav-link:hover { color:var(--cream); }
    .nav-link:hover::after { transform:scaleX(1); }
    .nav-link.active { color:var(--gold); }
    .nav-link.active::after { transform:scaleX(1); }

    /* ─── Profile Header ─── */
    .profile {
      min-height:100vh;
      padding:10rem 3rem 6rem;
      background:radial-gradient(ellipse at center 20%, #1a0f08 0%, #050302 60%, #000 100%);
    }
    .profile-header {
      display:flex; align-items:center; gap:1.8rem;
      margin-bottom:4rem; max-width:900px; margin-left:auto; margin-right:auto;
    }
    .profile-avatar {
      width:72px; height:72px; border-radius:50%;
      border:2px solid rgba(212,168,74,0.4);
      object-fit:cover;
    }
    .profile-avatar-placeholder {
      width:72px; height:72px; border-radius:50%;
      border:2px solid rgba(212,168,74,0.4);
      background:rgba(212,168,74,0.1);
      display:flex; align-items:center; justify-content:center;
      font-family:var(--serif); font-size:1.8rem; color:var(--gold);
    }
    .profile-info { flex:1; }
    .profile-name {
      font-family:var(--serif); font-size:1.8rem; font-weight:400;
      color:var(--cream); margin-bottom:0.3rem;
    }
    .profile-email {
      font-family:var(--sans); font-size:0.7rem; color:var(--muted);
      letter-spacing:0.03em;
    }
    .profile-signout {
      font-family:var(--sans); font-size:0.5rem; font-weight:400;
      letter-spacing:0.35em; text-transform:uppercase;
      color:rgba(241,227,191,0.4); background:none; border:1px solid rgba(241,227,191,0.15);
      padding:0.6rem 1.5rem; border-radius:1px; cursor:none;
      transition:all .3s;
    }
    .profile-signout:hover { color:var(--cream); border-color:var(--gold); }

    /* ─── Stats Row ─── */
    .stats-row {
      display:grid; grid-template-columns:repeat(3, 1fr); gap:1.5rem;
      max-width:900px; margin:0 auto 4rem;
    }
    .stat-card {
      background:rgba(26,15,8,0.6);
      border:1px solid var(--border);
      border-radius:4px;
      padding:1.8rem;
      text-align:center;
    }
    .stat-number {
      font-family:var(--serif); font-size:2.8rem; font-weight:700;
      color:var(--gold); line-height:1;
      margin-bottom:0.5rem;
    }
    .stat-label {
      font-family:var(--sans); font-size:0.5rem; font-weight:400;
      letter-spacing:0.4em; text-transform:uppercase;
      color:var(--muted);
    }

    /* ─── Section Headers ─── */
    .section-header {
      display:flex; align-items:center; gap:1rem;
      margin-bottom:2rem; max-width:900px; margin-left:auto; margin-right:auto;
    }
    .section-title {
      font-family:var(--serif); font-size:1.4rem; font-weight:400;
      font-style:italic; color:var(--cream);
    }
    .section-line { flex:1; height:1px; background:var(--border); }

    /* ─── Mood History ─── */
    .history-list {
      max-width:900px; margin:0 auto 4rem;
      display:flex; flex-direction:column; gap:1px;
    }
    .history-item {
      display:grid; grid-template-columns:auto 1fr auto;
      gap:1.5rem; align-items:center;
      padding:1.5rem 1.8rem;
      background:rgba(26,15,8,0.4);
      border:1px solid var(--border);
      border-radius:3px;
      transition:border-color .3s;
    }
    .history-item:hover { border-color:rgba(212,168,74,0.3); }
    .history-poster {
      width:44px; height:66px; border-radius:2px;
      object-fit:cover; background:rgba(212,168,74,0.08);
    }
    .history-poster-placeholder {
      width:44px; height:66px; border-radius:2px;
      background:rgba(212,168,74,0.08);
      display:flex; align-items:center; justify-content:center;
    }
    .history-poster-placeholder svg { opacity:0.3; }
    .history-content { min-width:0; }
    .history-film {
      font-family:var(--serif); font-size:1rem; font-weight:500;
      color:var(--cream); margin-bottom:0.3rem;
    }
    .history-mood {
      font-family:var(--sans); font-size:0.72rem; font-style:italic;
      color:var(--muted); line-height:1.5;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .history-date {
      font-family:var(--sans); font-size:0.55rem;
      color:rgba(241,227,191,0.3); letter-spacing:0.05em;
      white-space:nowrap;
    }
    .history-meta {
      display:flex; gap:0.8rem; align-items:center; margin-top:0.25rem;
    }
    .history-genre {
      font-family:var(--sans); font-size:0.5rem;
      letter-spacing:0.15em; text-transform:uppercase;
      color:rgba(212,168,74,0.5);
    }
    .history-actions {
      display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem;
    }
    .share-btn {
      font-family:var(--sans); font-size:0.45rem; font-weight:400;
      letter-spacing:0.3em; text-transform:uppercase;
      color:rgba(212,168,74,0.6); background:none;
      border:1px solid rgba(212,168,74,0.2);
      padding:0.4rem 0.9rem; border-radius:1px; cursor:none;
      transition:all .3s;
    }
    .share-btn:hover { color:var(--gold); border-color:var(--gold); }
    .share-btn.copied { color:var(--gold); border-color:var(--gold); }

    /* ─── Top Genres ─── */
    .genres-wrap {
      max-width:900px; margin:0 auto 4rem;
      display:flex; flex-wrap:wrap; gap:0.6rem;
    }
    .genre-tag {
      font-family:var(--sans); font-size:0.5rem;
      letter-spacing:0.3em; text-transform:uppercase;
      color:var(--muted); padding:0.5rem 1.2rem;
      border:1px solid var(--border); border-radius:1px;
    }
    .genre-tag .genre-count {
      color:var(--gold); margin-left:0.4rem;
    }

    /* ─── Empty State ─── */
    .empty-state {
      max-width:900px; margin:0 auto;
      text-align:center; padding:6rem 2rem;
    }
    .empty-icon { font-size:3rem; margin-bottom:1.5rem; opacity:0.5; }
    .empty-title {
      font-family:var(--serif); font-size:1.6rem; font-weight:400;
      font-style:italic; color:var(--cream); margin-bottom:0.8rem;
    }
    .empty-sub {
      font-family:var(--sans); font-size:0.8rem; color:var(--muted);
      line-height:1.7; margin-bottom:2rem;
    }
    .empty-cta {
      display:inline-flex; align-items:center; gap:0.8rem;
      padding:1rem 2.5rem; border:1px solid rgba(212,168,74,0.7);
      background:rgba(122,24,24,0.18); color:var(--cream);
      font-family:var(--sans); font-size:0.55rem; font-weight:500;
      letter-spacing:0.4em; text-transform:uppercase;
      text-decoration:none; border-radius:1px; cursor:none;
      position:relative; overflow:hidden;
    }
    .empty-cta::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg, var(--gold), var(--amber));
      transform:translateX(-101%);
      transition:transform .55s cubic-bezier(.4,0,.2,1);
    }
    .empty-cta:hover::before { transform:translateX(0); }
    .empty-cta:hover { color:var(--deep); border-color:var(--gold); }
    .empty-cta span { position:relative; z-index:1; }

    /* ─── Not Logged In ─── */
    .login-prompt {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:2rem; text-align:center;
      background:radial-gradient(ellipse at center, #1a0f08 0%, #050302 60%, #000 100%);
    }
    .login-prompt-title {
      font-family:var(--serif); font-size:2.2rem; font-weight:400;
      font-style:italic; color:var(--cream); margin-bottom:1rem;
    }
    .login-prompt-sub {
      font-family:var(--sans); font-size:0.8rem; color:var(--muted);
      line-height:1.7; margin-bottom:2.5rem; max-width:400px;
    }
    .google-btn-profile {
      display:inline-flex; align-items:center; gap:1rem;
      padding:1rem 2.5rem; background:#fff; color:#333;
      font-family:var(--sans); font-size:0.8rem; font-weight:500;
      border:none; border-radius:3px; cursor:none;
      transition:opacity .2s;
    }
    .google-btn-profile:hover { opacity:0.9; }

    /* ─── Footer ─── */
    .footer {
      padding:2rem 3rem;
      border-top:1px solid var(--border);
      max-width:900px; margin:0 auto;
      font-family:var(--sans); font-size:0.5rem;
      letter-spacing:0.35em; text-transform:uppercase;
      color:rgba(150,140,120,0.4); text-align:center;
    }

    /* ─── Toast ─── */
    .toast {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px);
      background:rgba(26,15,8,0.95); border:1px solid var(--gold);
      padding:0.8rem 2rem; border-radius:3px; z-index:1000;
      font-family:var(--sans); font-size:0.7rem; color:var(--gold);
      transition:transform .4s cubic-bezier(.22,1,.36,1);
      pointer-events:none;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* ─── Responsive ─── */
    @media (max-width:700px) {
      .nav { padding:1.4rem 1.5rem; }
      .profile { padding:8rem 1.5rem 4rem; }
      .profile-header { flex-direction:column; text-align:center; gap:1rem; }
      .stats-row { grid-template-columns:1fr; }
      .stat-number { font-size:2.2rem; }
      .history-item { grid-template-columns:1fr; gap:0.8rem; }
      .history-poster, .history-poster-placeholder { display:none; }
      .history-actions { flex-direction:row; }
      .profile-name { font-size:1.4rem; }
      .genres-wrap { justify-content:center; }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="dot"></div>
  <div class="grain"></div>

  <nav class="nav">
    <a class="nav-brand" href="/">Moodvie</a>
    <div class="nav-links">
      <a class="nav-link" href="about.html">About</a>
      <a class="nav-link" href="app.html">Try it</a>
      <a class="nav-link active" href="profile.html">Profile</a>
    </div>
  </nav>

  <!-- Not logged in -->
  <div class="login-prompt" id="loginPrompt" style="display:none">
    <p class="login-prompt-title">Your screening room</p>
    <p class="login-prompt-sub">Sign in to see your mood history, stats, and saved films. Every film Moodvie picks for you lives here.</p>
    <button class="google-btn-profile" id="google-signin">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- Profile content (logged in) -->
  <div class="profile" id="profileContent" style="display:none">

    <!-- Header -->
    <div class="profile-header">
      <div id="avatarWrap"></div>
      <div class="profile-info">
        <h1 class="profile-name" id="profileName"></h1>
        <p class="profile-email" id="profileEmail"></p>
      </div>
      <button class="profile-signout" id="signoutBtn">Sign out</button>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-number" id="statFilms">0</div>
        <div class="stat-label">Films matched</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statMoods">0</div>
        <div class="stat-label">Moods explored</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statGenre">—</div>
        <div class="stat-label">Top genre</div>
      </div>
    </div>

    <!-- Top Genres -->
    <div class="section-header">
      <h2 class="section-title">Your genres</h2>
      <div class="section-line"></div>
    </div>
    <div class="genres-wrap" id="genresWrap"></div>

    <!-- Mood History -->
    <div class="section-header">
      <h2 class="section-title">Mood history</h2>
      <div class="section-line"></div>
    </div>
    <div id="historyContainer"></div>

    <div class="footer">Moodvie · made by Galina</div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
  // ─── Auth ─────────────────────────────────────────────────────────────────
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('profileContent').style.display = 'block';
      renderProfile(user);
    } else {
      document.getElementById('loginPrompt').style.display = 'flex';
      document.getElementById('profileContent').style.display = 'none';
    }
  });

  document.getElementById('google-signin').addEventListener('click', () => {
    auth.signInWithPopup(provider).catch(err => console.error(err));
  });

  document.getElementById('signoutBtn').addEventListener('click', () => {
    auth.signOut().then(() => window.location.href = '/');
  });

  // ─── Render Profile ───────────────────────────────────────────────────────
  function renderProfile(user) {
    // Avatar
    const avatarWrap = document.getElementById('avatarWrap');
    if (user.photoURL) {
      avatarWrap.innerHTML = `<img class="profile-avatar" src="${user.photoURL}" alt="${user.displayName}">`;
    } else {
      const initial = (user.displayName || user.email || '?')[0].toUpperCase();
      avatarWrap.innerHTML = `<div class="profile-avatar-placeholder">${initial}</div>`;
    }

    document.getElementById('profileName').textContent = user.displayName || 'Film Lover';
    document.getElementById('profileEmail').textContent = user.email || '';

    // Load history
    const key = `moodvie_history_${user.uid}`;
    const history = JSON.parse(localStorage.getItem(key) || '[]');

    // Stats
    document.getElementById('statFilms').textContent = history.length;

    const uniqueMoods = new Set(history.map(h => h.mood)).size;
    document.getElementById('statMoods').textContent = uniqueMoods || history.length;

    // Genre stats
    const genreCounts = {};
    history.forEach(h => {
      (h.genres || []).forEach(g => {
        genreCounts[g] = (genreCounts[g] || 0) + 1;
      });
    });
    const sortedGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]);
    document.getElementById('statGenre').textContent = sortedGenres[0] ? sortedGenres[0][0] : '—';

    // Render genres
    const genresWrap = document.getElementById('genresWrap');
    if (sortedGenres.length > 0) {
      genresWrap.innerHTML = sortedGenres.slice(0, 8).map(([genre, count]) =>
        `<div class="genre-tag">${genre}<span class="genre-count">${count}</span></div>`
      ).join('');
    } else {
      genresWrap.innerHTML = '<p style="color:var(--muted); font-size:0.75rem; font-style:italic;">No genres yet. Get your first recommendation!</p>';
    }

    // Render history
    const container = document.getElementById('historyContainer');
    if (history.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🎬</div>
          <h3 class="empty-title">No screenings yet</h3>
          <p class="empty-sub">Tell Moodvie how you feel and get your first film match.<br>Every pick shows up here.</p>
          <a class="empty-cta" href="app.html"><span>Find My Film</span></a>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="history-list">${history.map((h, i) => {
      const date = new Date(h.date);
      const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const moodTrim = h.mood.length > 80 ? h.mood.slice(0, 78) + '...' : h.mood;
      const genreStr = (h.genres || []).slice(0, 2).join(' · ');

      return `<div class="history-item">
        ${h.poster
          ? `<img class="history-poster" src="${h.poster}" alt="${h.title}">`
          : `<div class="history-poster-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="12" cy="12" r="3"/></svg></div>`
        }
        <div class="history-content">
          <p class="history-film">${h.title} <span style="color:var(--muted); font-weight:300;">${h.year || ''}</span></p>
          <p class="history-mood">"${moodTrim}"</p>
          <div class="history-meta">
            ${genreStr ? `<span class="history-genre">${genreStr}</span>` : ''}
          </div>
        </div>
        <div class="history-actions">
          <span class="history-date">${dateStr}<br>${timeStr}</span>
          <button class="share-btn" data-index="${i}" onclick="shareFilm(${i})">Share</button>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  // ─── Share ─────────────────────────────────────────────────────────────────
  function shareFilm(index) {
    const user = auth.currentUser;
    if (!user) return;
    const history = JSON.parse(localStorage.getItem(`moodvie_history_${user.uid}`) || '[]');
    const film = history[index];
    if (!film) return;

    const text = `Moodvie matched me with "${film.title}" (${film.year}) because I was feeling: "${film.mood.slice(0, 100)}"\n\nTry it: https://mymoodvie.site`;

    if (navigator.share) {
      navigator.share({ title: 'My Moodvie Pick', text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard');
        const btn = document.querySelector(`[data-index="${index}"]`);
        if (btn) { btn.textContent = 'Copied'; btn.classList.add('copied'); }
      });
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ─── Cursor ────────────────────────────────────────────────────────────────
  const cursorEl = document.getElementById('cursor');
  const dotEl = document.getElementById('dot');
  let mxRaw = 0, myRaw = 0, cx = 0, cy = 0;
  document.addEventListener('mousemove', e => {
    mxRaw = e.clientX; myRaw = e.clientY;
    dotEl.style.left = e.clientX + 'px';
    dotEl.style.top = e.clientY + 'px';
  });
  (function animCursor() {
    cx += (mxRaw - cx) * 0.12;
    cy += (myRaw - cy) * 0.12;
    cursorEl.style.left = cx + 'px';
    cursorEl.style.top = cy + 'px';
    requestAnimationFrame(animCursor);
  })();
  </script>
</body>
</html>
